name: Deploy presentation

on:
  push:
    branches: [main]
    paths:
      - 'presentation/**'
      - '.github/workflows/presentation-pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: presentation-pages
  cancel-in-progress: true

jobs:
  # Публикует содержимое presentation/ в ветку gh-pages (корень сайта).
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./presentation
          commit_message: 'deploy: presentation'

  # Если в Settings → Pages выбран Source: GitHub Actions — этот job станет основным URL.
  deploy-github-actions:
    runs-on: ubuntu-latest
    needs: deploy-gh-pages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: presentation

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
