name: Deploy presentation

on:
  push:
    branches: [main]
    paths:
      - 'presentation/**'
      - '.github/workflows/presentation-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: presentation-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./presentation
          commit_message: 'deploy: presentation'
